name: Build Firmware ESP32

on:
  push:
    branches: [main]
    paths:
      - 'firmware/**'
    # Push tag v* → buat GitHub Release otomatis
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'firmware/**'
  workflow_dispatch:

concurrency:
  group: firmware-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build PlatformIO
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Build firmware
        working-directory: firmware
        run: pio run --environment esp32dev

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: |
            firmware/.pio/build/esp32dev/firmware.bin
            firmware/.pio/build/esp32dev/bootloader.bin
            firmware/.pio/build/esp32dev/partitions.bin
          retention-days: 30

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: ./dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Firmware ${{ github.ref_name }}"
          body: |
            ## Dava Monitoring Firmware ${{ github.ref_name }}

            ### Flash via esptool
            ```bash
            esptool.py --chip esp32 --baud 460800 write_flash \
              0x1000  bootloader.bin \
              0x8000  partitions.bin \
              0x10000 firmware.bin
            ```

            ### Flash via PlatformIO
            ```bash
            pio run --environment esp32dev --target upload
            ```

            ### Catatan
            - Setelah flash pertama kali, device akan buka AP `DAVA-Setup-XXXXXX`
            - Hubungkan ke AP tersebut dan buka browser untuk konfigurasi WiFi + nama device
          files: |
            dist/firmware.bin
            dist/bootloader.bin
            dist/partitions.bin
          generate_release_notes: true
