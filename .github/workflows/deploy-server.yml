name: Deploy Server to aaPanel

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
  workflow_dispatch:

concurrency:
  group: production-server
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy FastAPI to aaPanel
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Upload server code
        run: |
          rsync -avz --delete \
            --exclude='.venv/' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            --exclude='.env' \
            --exclude='ecosystem.config.js' \
            -e "ssh -i ~/.ssh/id_ed25519" \
            server/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/www/wwwroot/monitoring.kreasikaryaarjuna.co.id/server/

      - name: Install dependencies & restart PM2
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash << 'ENDSSH'
          set -e

          APP_DIR="/www/wwwroot/monitoring.kreasikaryaarjuna.co.id/server"
          cd "$APP_DIR"

          echo "=== Install Python dependencies ==="
          pip install -r requirements.txt -q

          echo "=== Restart PM2 ==="
          pm2 restart dava-monitoring-prod || pm2 start ecosystem.config.js --only dava-monitoring-prod
          pm2 save

          echo "=== Deploy selesai ==="
          ENDSSH

      - name: Health check
        run: |
          sleep 8
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://monitoring.kreasikaryaarjuna.co.id/")
          if [ "$STATUS" -ne 200 ]; then
            echo "Health check gagal: HTTP $STATUS"
            exit 1
          fi
          echo "Health check OK: HTTP $STATUS"

  tag-release:
    name: Tag Release
    runs-on: ubuntu-latest
    needs: [deploy]
    if: needs.deploy.result == 'success'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release tag
        run: |
          DATE=$(date +'%Y%m%d-%H%M')
          SHA=$(git rev-parse --short HEAD)
          TAG="server-${DATE}-${SHA}"
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Release tag: $TAG"
