server {
    listen 80;
    server_name monitoring.kreasikaryaarjuna.co.id;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name monitoring.kreasikaryaarjuna.co.id;

    ssl_certificate     /www/server/panel/vhost/cert/monitoring.kreasikaryaarjuna.co.id/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/monitoring.kreasikaryaarjuna.co.id/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /www/wwwroot/monitoring.kreasikaryaarjuna.co.id;
    access_log /www/wwwlogs/monitoring.kreasikaryaarjuna.co.id.log;
    error_log  /www/wwwlogs/monitoring.kreasikaryaarjuna.co.id.error.log;

    # SSE — real-time stream endpoint
    location /api/stream {
        proxy_pass         http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Static files — served directly (faster)
    location /static/ {
        alias /www/wwwroot/monitoring.kreasikaryaarjuna.co.id/server/api/static/;
        expires 7d;
        access_log off;
    }

    # All other requests → FastAPI
    location / {
        proxy_pass         http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_cache        off;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ACME SSL challenge
    location ~ \.well-known {
        allow all;
        root /www/wwwroot/monitoring.kreasikaryaarjuna.co.id;
    }
}
